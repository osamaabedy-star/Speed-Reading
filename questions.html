<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أسئلة الفهم · تقييم القراءة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* الأنماط من ملفك الأصلي مع إضافة شريط التقدم */
        :root { --bg: #f8fafc; --card-bg: #ffffff; --text: #0f172a; --text-light: #475569; --primary: #4361ee; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --border: #e2e8f0; --shadow: 0 4px 10px rgba(0,0,0,0.03); --radius-lg: 32px; --radius-md: 24px; --radius-sm: 16px; }
        [data-theme="dark"] { --bg: #0b1120; --card-bg: #1e293b; --text: #f1f5f9; --text-light: #94a3b8; --primary: #667eea; --border: #334155; }
        [data-theme="comfort"] { --bg: #e6d5b8; --card-bg: #fff7ed; --text: #5e4b3c; --text-light: #8b7a6b; --primary: #b38b5d; --border: #d4b89c; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI','Cairo',Tahoma,sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; min-height:100vh; transition:background 0.3s,color 0.3s; font-size:14px; }
        .container { max-width:950px; margin:0 auto; }
        .header { background:var(--card-bg); border-radius:var(--radius-lg); padding:10px 20px; margin-bottom:15px; box-shadow:var(--shadow); display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border); }
        .progress-bar-container { width:100%; height:8px; background:var(--border); border-radius:10px; margin:10px 0; }
        .progress-bar-fill { height:100%; background:var(--primary); border-radius:10px; width:0%; transition:width 0.3s; }
        /* باقي الأنماط من ملفك الأصلي (option, order-item-row, etc.) */
    </style>
</head>
<body data-theme="light">
<div class="container">
    <div class="header">
        <div class="logo"><i class="fas fa-question-circle"></i><span>اختبر نفسك</span></div>
        <div class="lesson-name" id="headerLessonName"></div>
        <a href="index.html" class="btn-home"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <div id="questionsSection">
        <div class="questions-header">
            <h3><i class="fas fa-pencil-alt"></i> أجب عن الأسئلة</h3>
            <span class="question-counter" id="questionCounter">1 / 0</span>
        </div>
        <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBarFill"></div></div>
        <div id="questionContainer" class="question-box"></div>
        <div class="navigation-buttons">
            <button class="nav-btn" id="prevBtn" disabled><i class="fas fa-arrow-right"></i> السابق</button>
            <button class="nav-btn" id="nextBtn">التالي <i class="fas fa-arrow-left"></i></button>
        </div>
        <button class="submit-btn" id="submitBtn" disabled>سلم الإجابات</button>
    </div>

    <!-- مودال التقرير (نفس السابق) -->
    <div id="reportModal" class="modal">...</div>
</div>

<script src="database.js"></script>
<script>
    (function() {
        const sessionData = JSON.parse(sessionStorage.getItem('currentReadingSession'));
        if (!sessionData) { alert('لا توجد بيانات جلسة قراءة'); window.location.href = 'index.html'; return; }

        const lessonTitle = sessionData.lessonTitle;
        const speed = sessionData.speed || 0;
        const errorsCount = sessionData.errors || 0;
        const duration = sessionData.duration || 0;
        let allQuestions = sessionData.questions || [];

        document.getElementById('headerLessonName').textContent = lessonTitle;

        // دالة التحقق من صحة السؤال (مع items بدلاً من events)
        function validateQuestion(q) {
            if (!q) return false;
            if (q.type === 'order') {
                if (!Array.isArray(q.items) || q.items.length === 0) return false;
                if (!Array.isArray(q.correctOrder)) return false;
                return q.correctOrder.every(idx => typeof idx === 'number' && idx >= 0 && idx < q.items.length);
            } else {
                if (!Array.isArray(q.options) || q.options.length === 0) return false;
                if (typeof q.correct !== 'number' || q.correct < 0 || q.correct >= q.options.length) return false;
                return true;
            }
        }

        const validQuestions = allQuestions.filter(q => validateQuestion(q));
        if (validQuestions.length === 0) {
            document.getElementById('questionsSection').innerHTML = '<div class="no-questions"><i class="fas fa-exclamation-triangle fa-4x"></i><h3>الأسئلة غير صالحة</h3></div>';
            return;
        }

        // اختيار 10 أسئلة عشوائياً
        function selectQuestions(questionsArray, count = 10) {
            if (questionsArray.length <= count) return [...questionsArray];
            const shuffled = [...questionsArray];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }

        let questions = selectQuestions(validQuestions, 10);
        let currentQuestionIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let quizSubmitted = false;
        let correctAnswersCount = 0;

        const questionContainer = document.getElementById('questionContainer');
        const questionCounter = document.getElementById('questionCounter');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const progressBarFill = document.getElementById('progressBarFill');
        const reportModal = document.getElementById('reportModal');
        // باقي عناصر المودال...

        function updateCounter() {
            questionCounter.textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressBarFill.style.width = progress + '%';
        }

        let sortableInstance = null;

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            if (!q) return;

            let html = `<div class="question-text">${currentQuestionIndex + 1}. ${escapeHtml(q.text || '')}</div>`;

            if (q.type === 'order') {
                const items = q.items || [];
                if (items.length === 0) html += `<p>لا توجد أحداث</p>`;
                else {
                    let currentOrder = userAnswers[currentQuestionIndex];
                    if (!currentOrder) {
                        currentOrder = [...items];
                        userAnswers[currentQuestionIndex] = currentOrder;
                    }
                    html += `<div class="order-container" id="sortable-container">`;
                    currentOrder.forEach((itemText, idx) => {
                        html += `
                            <div class="order-item-row" data-idx="${idx}">
                                <span class="order-number">${idx + 1}</span>
                                <span class="order-item-text">${escapeHtml(itemText)}</span>
                                <span class="drag-handle"><i class="fas fa-grip-vertical"></i></span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            } else {
                const options = q.options || [];
                if (options.length === 0) html += `<p>⚠️ لا توجد خيارات</p>`;
                else {
                    html += `<div class="options-grid">`;
                    options.forEach((opt, idx) => {
                        let cls = 'option';
                        if (userAnswers[currentQuestionIndex] === idx) cls += ' selected';
                        if (quizSubmitted) {
                            if (idx === q.correct) cls += ' correct';
                            else if (userAnswers[currentQuestionIndex] === idx) cls += ' wrong';
                        }
                        html += `<div class="${cls}" data-opt-index="${idx}">${escapeHtml(opt)}</div>`;
                    });
                    html += `</div>`;
                }
            }

            questionContainer.innerHTML = html;

            if (q.type !== 'order') {
                document.querySelectorAll('.option').forEach(optEl => {
                    optEl.addEventListener('click', () => {
                        if (quizSubmitted) return;
                        const optIdx = parseInt(optEl.dataset.optIndex, 10);
                        userAnswers[currentQuestionIndex] = optIdx;
                        renderQuestion();
                    });
                });
            }

            if (q.type === 'order' && !quizSubmitted) {
                const container = document.getElementById('sortable-container');
                if (container) {
                    if (sortableInstance) sortableInstance.destroy();
                    sortableInstance = new Sortable(container, {
                        animation: 150,
                        handle: '.drag-handle',
                        onEnd: (evt) => {
                            const newOrder = [];
                            const items = container.querySelectorAll('.order-item-row');
                            items.forEach(item => {
                                const textEl = item.querySelector('.order-item-text');
                                newOrder.push(textEl.textContent);
                            });
                            userAnswers[currentQuestionIndex] = newOrder;
                        }
                    });
                }
            } else if (sortableInstance) {
                sortableInstance.destroy();
                sortableInstance = null;
            }

            prevBtn.disabled = (currentQuestionIndex === 0) || quizSubmitted;
            nextBtn.disabled = (currentQuestionIndex === questions.length - 1) || quizSubmitted;

            const allAnswered = userAnswers.every(ans => {
                if (Array.isArray(ans)) return ans.length > 0;
                return ans !== null;
            });
            submitBtn.disabled = !allAnswered || quizSubmitted;
        }

        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0 && !quizSubmitted) {
                currentQuestionIndex--;
                renderQuestion();
                updateCounter();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length - 1 && !quizSubmitted) {
                currentQuestionIndex++;
                renderQuestion();
                updateCounter();
            }
        });

        async function submitAnswers() {
            if (quizSubmitted) return;
            if (!confirm('هل أنت متأكد من تسليم الإجابات؟')) return;

            correctAnswersCount = 0;
            const wrongDetails = [];

            userAnswers.forEach((ans, idx) => {
                const q = questions[idx];
                if (!q) return;
                let isCorrect = false;
                if (q.type === 'order') {
                    if (ans && Array.isArray(ans)) {
                        const correctOrderTexts = q.correctOrder.map(i => q.items[i]);
                        if (JSON.stringify(ans) === JSON.stringify(correctOrderTexts)) isCorrect = true;
                    }
                } else {
                    if (ans === q.correct) isCorrect = true;
                }
                if (isCorrect) correctAnswersCount++;
                else {
                    let userAnswerText = '';
                    if (q.type === 'order') {
                        userAnswerText = (ans && Array.isArray(ans)) ? ans.join(' → ') : 'لم يرتب';
                    } else {
                        userAnswerText = (ans !== null && q.options[ans]) ? q.options[ans] : 'لم يجب';
                    }
                    let correctAnswerText = (q.type === 'order') ? q.correctOrder.map(i => q.items[i]).join(' → ') : q.options[q.correct];
                    wrongDetails.push({
                        question: q.text || `سؤال ${idx+1}`,
                        userAnswer: userAnswerText,
                        correctAnswer: correctAnswerText
                    });
                }
            });

            const total = questions.length;
            const score = Math.round((correctAnswersCount / total) * 100);

            // عرض المودال (تفاصيل مشابهة للسابق)
            // ... (يمكنك ترك الكود القديم)
            // ثم حفظ النتائج
            try {
                await saveQuizResult({
                    lessonId: sessionData.lessonId,
                    lessonTitle: lessonTitle,
                    score: score,
                    correctAnswers: correctAnswersCount,
                    totalQuestions: total
                });
            } catch (error) {
                console.error('فشل حفظ نتيجة الاختبار:', error);
            }

            quizSubmitted = true;
            renderQuestion();
            submitBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;

            // إظهار المودال
            // ... (كما في ملفك الأصلي مع إضافة البيانات)
        }

        submitBtn.addEventListener('click', submitAnswers);

        // تطبيق الثيم
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);

        renderQuestion();
        updateCounter();
    })();
</script>
</body>
</html>
