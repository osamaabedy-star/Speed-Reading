<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مغامرة القراءة السريعة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&family=Tajawal:wght@400;700&family=Almarai:wght@400;700&family=Readex+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* الأنماط من ملفك الأصلي - احتفظ بها كاملة */
        /* سأختصر هنا */
    </style>
</head>
<body data-theme="light">
<div class="loading" id="loadingScreen"><i class="fas fa-spinner fa-spin"></i> جاري التجهيز...</div>

<!-- المودالات (نفس السابق) -->
<div class="custom-modal" id="messageModal">...</div>
<div class="custom-modal" id="confirmModal">...</div>
<div class="custom-modal" id="reportModal">...</div>

<!-- الشريط العلوي -->
<div class="top-bar">
    <div class="lesson-info">
        <img src="https://www.wzufa.com/wp-content/uploads/2022/07/Riyadh-Al-Ebdaa-Schools.png" alt="شعار المدرسة" class="school-logo-small">
        <span class="lesson-title" id="lesson-title">جاري التحميل...</span>
        <span class="error-toast-top" id="errorToastTop"><i class="fas fa-check-circle"></i><span>تم تسجيل خطأ</span></span>
    </div>
    <div class="stats">
        <div class="stat-item"><i class="far fa-clock"></i> <span id="timer">00:00</span></div>
        <div class="stat-item"><i class="fas fa-tachometer-alt"></i> <span id="speed-tag">150</span></div>
        <div class="stat-item"><i class="fas fa-font"></i> <span id="font-size-indicator">32</span></div>
    </div>
    <div class="progress-container"><div id="progressBar"></div></div>
</div>

<!-- منطقة عرض النص -->
<div id="reader-viewport">
    <div id="countdown"></div>
    <div id="rsvp-container"><div id="rsvp-word"></div></div>
    <div id="scroll-container"></div>
    <div id="static-container"><div class="static-content" id="static-content"></div></div>
</div>

<!-- لوحة التحكم الجانبية (نفسها) -->
<div class="control-panel">...</div>

<!-- زر الخطأ -->
<button class="error-left-btn" id="errorBtn" title="تسجيل خطأ" style="display: none;"><i class="fas fa-exclamation-circle"></i><span>سجل خطأ</span></button>

<script src="database.js"></script>
<script>
    (async function() {
        // إخفاء شاشة التحميل بعد التحميل
        window.addEventListener('load', () => document.getElementById('loadingScreen').style.display = 'none');

        const errorToastTop = document.getElementById('errorToastTop');
        function showErrorToastTop() {
            errorToastTop.classList.add('show');
            setTimeout(() => errorToastTop.classList.remove('show'), 1500);
        }

        // قراءة الإعدادات
        const config = JSON.parse(sessionStorage.getItem('reader_config'));
        if (!config) { alert('لم يتم تحديد إعدادات القراءة.'); window.location.href = 'index.html'; return; }

        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!currentUser) { alert('الرجاء تسجيل الدخول أولاً'); window.location.href = 'login.html'; return; }

        // محاولة جلب الدرس من localStorage أو من API
        let lesson;
        const allLessons = JSON.parse(localStorage.getItem('reading_app_lessons')) || [];
        lesson = allLessons.find(l => l.id === config.lessonId);
        if (!lesson) {
            try {
                lesson = await getLessonById(config.lessonId);
                // لا نخزنه في localStorage لتجنب تكرار البيانات، لكن يمكن إضافته مؤقتاً
            } catch (error) {
                alert('النص المطلوب غير موجود.');
                window.location.href = 'index.html';
                return;
            }
        }

        const words = lesson.content.trim().split(/\s+/);
        let currentIndex = 0;
        let isPlaying = false;
        let startTime = null;
        let timerInterval = null;
        let rafId = null;
        let currentSpeed = parseInt(config.speed) || 150;
        let wordTimeMs = 60000 / currentSpeed;
        
        // متغيرات التمرير
        let scrollLastTimestamp = 0;
        let scrollCurrentY = 0;
        let scrollTotalDistance = 0;
        let scrollPixelsPerSecond = 0;
        
        let currentWordsPerLine = 10;
        
        let totalErrors = 0;
        let errorWordsList = []; // الآن نخزن الكلمات نفسها

        let currentFontSize = parseInt(config.fontSize) || 32;
        let currentLineHeight = 1.8;

        // تطبيق الثيم
        if (config.theme) document.body.setAttribute('data-theme', config.theme);
        else document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        document.body.style.fontFamily = config.font;

        // عناصر DOM
        const lessonTitleEl = document.getElementById('lesson-title');
        const speedTagEl = document.getElementById('speed-tag');
        const speedDisplay = document.getElementById('speedDisplay');
        const timerEl = document.getElementById('timer');
        const fontSizeIndicator = document.getElementById('font-size-indicator');
        const rsvpContainer = document.getElementById('rsvp-container');
        const scrollContainer = document.getElementById('scroll-container');
        const staticContainer = document.getElementById('static-container');
        const staticContent = document.getElementById('static-content');
        const rsvpWordEl = document.getElementById('rsvp-word');
        const countdownEl = document.getElementById('countdown');
        const progressBar = document.getElementById('progressBar');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const speedUpBtn = document.getElementById('speedUpBtn');
        const speedDownBtn = document.getElementById('speedDownBtn');
        const fontIncreaseBtn = document.getElementById('fontIncreaseBtn');
        const fontDecreaseBtn = document.getElementById('fontDecreaseBtn');
        const lineHeightIncreaseBtn = document.getElementById('lineHeightIncreaseBtn');
        const lineHeightDecreaseBtn = document.getElementById('lineHeightDecreaseBtn');
        const errorBtn = document.getElementById('errorBtn');
        const wplControl = document.getElementById('wplControl');
        const wplUp = document.getElementById('wplUp');
        const wplDown = document.getElementById('wplDown');
        const wordsPerLineValue = document.getElementById('wordsPerLineValue');

        // المودالات (اختصاراً)
        const reportModal = document.getElementById('reportModal');
        const reportSpeed = document.getElementById('reportSpeed');
        const reportWords = document.getElementById('reportWords');
        const reportErrors = document.getElementById('reportErrors');
        const reportErrorWordsContainer = document.getElementById('reportErrorWordsContainer');
        const reportErrorWords = document.getElementById('reportErrorWords');
        const reportCompleted = document.getElementById('reportCompleted');
        const reportQuestionsBtn = document.getElementById('reportQuestionsBtn');
        const reportHomeBtn = document.getElementById('reportHomeBtn');

        reportQuestionsBtn.onclick = () => { releaseWakeLock(); window.location.href = 'questions.html'; };
        reportHomeBtn.onclick = () => { releaseWakeLock(); window.location.href = 'index.html'; };

        lessonTitleEl.innerText = lesson.title;
        updateSpeedDisplay();
        updateFontSizeDisplay();

        function updateSpeedDisplay() {
            speedTagEl.innerText = currentSpeed;
            if (speedDisplay) speedDisplay.innerText = currentSpeed;
            wordTimeMs = 60000 / currentSpeed;
        }
        function updateFontSizeDisplay() { fontSizeIndicator.innerText = currentFontSize; }

        // دالة تنسيق النص إلى HTML مع كلمات قابلة للنقر
        function formatTextToFixedWordsHTML(text, wordsPerLine = 5) {
            const wordsArray = text.split(/\s+/);
            let lines = [];
            for (let i = 0; i < wordsArray.length; i += wordsPerLine) {
                let lineWords = wordsArray.slice(i, i + wordsPerLine);
                let lineHTML = lineWords.map((word, idx) => 
                    `<span class="word" data-word="${escapeHtml(word)}" data-index="${i + idx}" onclick="window.toggleError(this)">${escapeHtml(word)}</span>`
                ).join(' ');
                lines.push(`<div class="line">${lineHTML}</div>`);
            }
            return lines.join('');
        }

        // إعداد وضع القراءة
        if (config.mode === 'rsvp') {
            rsvpContainer.style.display = 'block';
            rsvpContainer.style.fontSize = currentFontSize + 'px';
            errorBtn.style.display = 'flex';
            wplControl.style.display = 'none';
        } else if (config.mode === 'scroll') {
            scrollContainer.style.display = 'block';
            scrollContainer.innerHTML = formatTextToFixedWordsHTML(lesson.content, currentWordsPerLine);
            scrollContainer.style.fontSize = currentFontSize + 'px';
            scrollContainer.style.lineHeight = currentLineHeight;
            const viewportHeight = window.innerHeight;
            const textHeight = scrollContainer.offsetHeight;
            scrollTotalDistance = textHeight + viewportHeight;
            scrollPixelsPerSecond = scrollTotalDistance / ((words.length / currentSpeed) * 60);
            scrollCurrentY = window.innerHeight;
            scrollContainer.style.transform = `translateY(${scrollCurrentY}px)`;
            errorBtn.style.display = 'none';
            wplControl.style.display = 'block';
            wordsPerLineValue.innerText = currentWordsPerLine;
        } else { // static
            staticContainer.style.display = 'block';
            staticContent.innerHTML = formatTextToFixedWordsHTML(lesson.content, 1000);
            staticContainer.style.fontSize = currentFontSize + 'px';
            staticContainer.style.lineHeight = currentLineHeight;
            errorBtn.style.display = 'none';
            wplControl.style.display = 'none';
        }

        // دوال التحكم
        function startCountdown() {
            let count = 3;
            countdownEl.style.display = 'block';
            playPauseBtn.disabled = true;
            stopBtn.disabled = true;
            speedUpBtn.disabled = true;
            speedDownBtn.disabled = true;
            const interval = setInterval(() => {
                if (count > 0) countdownEl.innerText = count;
                else if (count === 0) countdownEl.innerText = "انطلق!";
                else {
                    clearInterval(interval);
                    countdownEl.style.display = 'none';
                    playPauseBtn.disabled = false;
                    stopBtn.disabled = false;
                    speedUpBtn.disabled = false;
                    speedDownBtn.disabled = false;
                    startReading();
                }
                count--;
            }, 500);
        }

        function startReading() {
            isPlaying = true;
            startTime = Date.now();
            startTimer();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            requestWakeLock();

            if (config.mode === 'rsvp') {
                currentIndex = 0;
                scheduleNextRSVP();
            } else if (config.mode === 'scroll') {
                scrollLastTimestamp = 0;
                rafId = requestAnimationFrame(scrollStep);
            }
        }

        function scheduleNextRSVP(immediate = false) {
            if (!isPlaying || currentIndex >= words.length) {
                if (currentIndex >= words.length) finish();
                return;
            }
            displayWord(currentIndex);
            progressBar.style.width = ((currentIndex + 1) / words.length) * 100 + '%';
            const currentWord = words[currentIndex];
            currentIndex++;
            if (currentIndex < words.length) {
                let delay = immediate ? 0 : wordTimeMs;
                if (/[.!?،؛:]$/.test(currentWord)) delay *= 1.5;
                rsvpTimer = setTimeout(scheduleNextRSVP, delay);
            } else {
                setTimeout(finish, wordTimeMs);
            }
        }

        function displayWord(index) {
            let word = words[index];
            const clean = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?؟،…]/g, '');
            const pivotIdx = Math.floor(clean.length / 2);
            const before = clean.substring(0, pivotIdx);
            const pivot = clean[pivotIdx];
            const after = clean.substring(pivotIdx + 1);
            rsvpWordEl.innerHTML = `${escapeHtml(before)}<span class="pivot">${escapeHtml(pivot)}</span>${escapeHtml(after)}`;
        }

        function scrollStep(timestamp) {
            if (!isPlaying) return;
            if (!scrollLastTimestamp) { scrollLastTimestamp = timestamp; rafId = requestAnimationFrame(scrollStep); return; }
            const elapsed = (timestamp - scrollLastTimestamp) / 1000;
            const delta = scrollPixelsPerSecond * elapsed;
            scrollCurrentY -= delta;
            scrollContainer.style.transform = `translateY(${scrollCurrentY}px)`;
            const progress = Math.min(100, Math.max(0, ((-scrollCurrentY) / scrollTotalDistance) * 100));
            progressBar.style.width = progress + '%';
            scrollLastTimestamp = timestamp;
            if (-scrollCurrentY < scrollTotalDistance - window.innerHeight) {
                rafId = requestAnimationFrame(scrollStep);
            } else {
                finish();
            }
        }

        function recordError() {
            if (!isPlaying) return;
            totalErrors++;
            if (config.mode === 'rsvp' && currentIndex > 0) {
                const errorWord = words[currentIndex - 1];
                if (!errorWordsList.includes(errorWord)) errorWordsList.push(errorWord);
                rsvpWordEl.style.transition = 'color 0.2s';
                rsvpWordEl.style.color = 'var(--accent)';
                setTimeout(() => rsvpWordEl.style.color = '', 300);
            }
            showErrorToastTop();
        }

        errorBtn.addEventListener('click', recordError);

        window.toggleError = function(element) {
            if (!isPlaying) return;
            element.classList.toggle('error-word');
            const word = element.dataset.word;
            if (element.classList.contains('error-word')) {
                if (!errorWordsList.includes(word)) errorWordsList.push(word);
            } else {
                errorWordsList = errorWordsList.filter(w => w !== word);
            }
            totalErrors = errorWordsList.length;
            showErrorToastTop();
        };

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (startTime) {
                    const diff = Math.floor((Date.now() - startTime) / 1000);
                    timerEl.innerHTML = formatTime(diff);
                }
            }, 1000);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function togglePlay() {
            if (!startTime) return;
            isPlaying = !isPlaying;
            playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            if (isPlaying) {
                if (!timerInterval) startTimer();
                if (config.mode === 'rsvp') scheduleNextRSVP();
                else if (config.mode === 'scroll') { scrollLastTimestamp = 0; rafId = requestAnimationFrame(scrollStep); }
            } else {
                if (rsvpTimer) { clearTimeout(rsvpTimer); rsvpTimer = null; }
                if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            }
        }

        function stopReading() {
            if (confirm('هل تريد إنهاء القراءة الآن؟')) finish();
        }

        function finish() {
            releaseWakeLock();
            clearInterval(timerInterval);
            if (rsvpTimer) { clearTimeout(rsvpTimer); rsvpTimer = null; }
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
            isPlaying = false;

            const endTime = Date.now();
            const duration = Math.floor((endTime - startTime) / 1000);
            
            let wordsRead;
            let completed = false;
            if (config.mode === 'scroll') {
                const progress = Math.min(1, Math.max(0, (-scrollCurrentY) / scrollTotalDistance));
                wordsRead = Math.round(words.length * progress);
                completed = wordsRead >= words.length;
            } else {
                wordsRead = currentIndex;
                completed = wordsRead >= words.length;
            }
            const minutes = duration / 60;
            const avgSpeed = minutes > 0 ? Math.round(wordsRead / minutes) : 0;

            reportSpeed.textContent = toIndianNumbers(avgSpeed);
            reportWords.textContent = toIndianNumbers(words.length);
            reportErrors.textContent = toIndianNumbers(totalErrors);
            reportCompleted.textContent = completed ? 'نعم' : 'لا';
            
            if (errorWordsList.length > 0) {
                reportErrorWordsContainer.style.display = 'block';
                reportErrorWords.innerHTML = errorWordsList.map(w => `<span class="error-item">${escapeHtml(w)}</span>`).join('');
            } else {
                reportErrorWordsContainer.style.display = 'none';
            }

            // حفظ الجلسة في API
            const sessionData = {
                lessonId: config.lessonId,
                lessonTitle: lesson.title,
                speed: avgSpeed,
                errors: totalErrors,
                duration: duration,
                wordsRead: wordsRead,
                totalWords: words.length,
                completed: completed,
                errorWordsJson: JSON.stringify(errorWordsList) // نخزن الكلمات
            };
            saveReadingSession(sessionData).catch(err => console.error('فشل حفظ الجلسة:', err));

            // تخزين بيانات مؤقتة للانتقال إلى الأسئلة
            sessionStorage.setItem('currentReadingSession', JSON.stringify({
                lessonId: config.lessonId,
                lessonTitle: lesson.title,
                speed: avgSpeed,
                errors: totalErrors,
                duration: duration,
                questions: lesson.questions || []
            }));

            reportModal.classList.add('show');
        }

        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => console.log('قفل الشاشة محرر'));
                }
            } catch (err) { console.error(err); }
        }
        function releaseWakeLock() { if (wakeLock) { wakeLock.release().catch(()=>{}).finally(()=>wakeLock=null); } }

        // أحداث الأزرار
        playPauseBtn.addEventListener('click', togglePlay);
        stopBtn.addEventListener('click', stopReading);
        speedUpBtn.addEventListener('click', () => adjustSpeed(currentSpeed + 10));
        speedDownBtn.addEventListener('click', () => adjustSpeed(currentSpeed - 10));
        function adjustSpeed(newSpeed) {
            if (newSpeed < 10) newSpeed = 10;
            if (newSpeed > 400) newSpeed = 400;
            currentSpeed = newSpeed;
            updateSpeedDisplay();
            if (config.mode === 'scroll' && isPlaying) {
                const totalSeconds = (words.length / currentSpeed) * 60;
                scrollPixelsPerSecond = scrollTotalDistance / totalSeconds;
            }
            if (config.mode === 'rsvp' && isPlaying) {
                if (rsvpTimer) { clearTimeout(rsvpTimer); rsvpTimer = null; }
                scheduleNextRSVP(true);
            }
        }

        wplUp.addEventListener('click', () => { if (currentWordsPerLine < 20) { currentWordsPerLine++; wordsPerLineValue.innerText = currentWordsPerLine; recalcScrollDistance(); } });
        wplDown.addEventListener('click', () => { if (currentWordsPerLine > 1) { currentWordsPerLine--; wordsPerLineValue.innerText = currentWordsPerLine; recalcScrollDistance(); } });
        function recalcScrollDistance() {
            if (config.mode !== 'scroll') return;
            const wasPlaying = isPlaying;
            if (wasPlaying) togglePlay();
            scrollContainer.innerHTML = formatTextToFixedWordsHTML(lesson.content, currentWordsPerLine);
            scrollContainer.style.fontSize = currentFontSize + 'px';
            scrollContainer.style.lineHeight = currentLineHeight;
            const textHeight = scrollContainer.offsetHeight;
            const viewportHeight = window.innerHeight;
            scrollTotalDistance = textHeight + viewportHeight;
            const totalSeconds = (words.length / currentSpeed) * 60;
            scrollPixelsPerSecond = scrollTotalDistance / totalSeconds;
            scrollCurrentY = -progressBar.offsetWidth / 100 * scrollTotalDistance; // تبسيط
            if (wasPlaying) { isPlaying = true; playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; scrollLastTimestamp = 0; rafId = requestAnimationFrame(scrollStep); }
        }

        fontIncreaseBtn.addEventListener('click', () => { if (currentFontSize < 96) { currentFontSize += 4; updateFontSize(); } });
        fontDecreaseBtn.addEventListener('click', () => { if (currentFontSize > 12) { currentFontSize -= 4; updateFontSize(); } });
        function updateFontSize() {
            if (config.mode === 'rsvp') rsvpContainer.style.fontSize = currentFontSize + 'px';
            else if (config.mode === 'scroll') { scrollContainer.style.fontSize = currentFontSize + 'px'; recalcScrollDistance(); }
            else if (config.mode === 'static') staticContainer.style.fontSize = currentFontSize + 'px';
            updateFontSizeDisplay();
        }

        lineHeightIncreaseBtn.addEventListener('click', () => { currentLineHeight += 0.2; updateLineHeight(); });
        lineHeightDecreaseBtn.addEventListener('click', () => { if (currentLineHeight > 1.2) { currentLineHeight -= 0.2; updateLineHeight(); } });
        function updateLineHeight() {
            if (config.mode === 'scroll') { scrollContainer.style.lineHeight = currentLineHeight; recalcScrollDistance(); }
            else if (config.mode === 'static') staticContainer.style.lineHeight = currentLineHeight;
        }

        // بدء العد التنازلي
        startCountdown();
    })();
</script>
</body>
</html>
