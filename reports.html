<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقاريري - منصة القراءة السريعة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* نفس الأنماط السابقة - احتفظ بها */
    </style>
</head>
<body data-theme="light">
<div class="container">
    <div class="header">
        <div class="logo"><i class="fas fa-chart-line"></i><h1>تقاريري</h1></div>
        <div class="nav-links"><a href="index.html" class="nav-link"><i class="fas fa-home"></i> الرئيسية</a><a href="javascript:logoutUser()" class="nav-link"><i class="fas fa-sign-out-alt"></i> خروج</a></div>
    </div>

    <!-- إحصائيات سريعة -->
    <div class="stats-grid" id="statsGrid">...</div>

    <!-- الرسوم البيانية -->
    <div class="charts-row">...</div>

    <!-- آخر الجلسات -->
    <div class="recent-list">
        <div class="list-title"><i class="fas fa-history"></i> آخر 10 جلسات قراءة</div>
        <div class="table-responsive">
            <table id="recentSessionsTable">
                <thead><tr><th>التاريخ</th><th>النص</th><th>السرعة</th><th>الأخطاء</th><th>الدرجة</th><th>المدة (ث)</th><th>الحالة</th><th>التفاصيل</th></tr></thead>
                <tbody id="sessionsBody"><tr><td colspan="8" class="loading">جاري تحميل البيانات...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div class="footer-note"><i class="fas fa-chart-simple"></i> إحصائيات مبنية على أدائك في المنصة</div>
</div>

<!-- مودال عرض تفاصيل الأخطاء -->
<div class="modal" id="errorDetailsModal">
    <div class="modal-content">
        <span class="close-modal" id="closeErrorModal">&times;</span>
        <h3><i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i> تفاصيل الأخطاء</h3>
        <div id="modalErrorWords" class="error-words-list"></div>
        <button class="details-btn" id="closeErrorModalBtn">إغلاق</button>
    </div>
</div>

<script src="database.js"></script>
<script>
    (async function() {
        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!currentUser) { window.location.href = 'login.html'; return; }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);

        const totalLessonsEl = document.getElementById('totalLessons');
        const avgSpeedEl = document.getElementById('avgSpeed');
        const avgScoreEl = document.getElementById('avgScore');
        const totalTimeEl = document.getElementById('totalTime');
        const sessionsBody = document.getElementById('sessionsBody');

        // مودال الأخطاء
        const errorModal = document.getElementById('errorDetailsModal');
        const modalErrorWords = document.getElementById('modalErrorWords');
        const closeErrorModal = document.getElementById('closeErrorModal');
        const closeErrorModalBtn = document.getElementById('closeErrorModalBtn');
        closeErrorModal.addEventListener('click', () => errorModal.classList.remove('show'));
        closeErrorModalBtn.addEventListener('click', () => errorModal.classList.remove('show'));
        window.addEventListener('click', (e) => { if (e.target === errorModal) errorModal.classList.remove('show'); });

        let sessions = [], quizzes = [];
        try {
            sessions = await getReadingSessions(currentUser.username);
            quizzes = await getQuizResults(currentUser.username);
        } catch (error) {
            console.error(error);
            sessionsBody.innerHTML = `<tr><td colspan="8" style="color:var(--danger);">فشل تحميل البيانات: ${error.message}</td></tr>`;
        }

        // حساب الإحصائيات
        const totalSessions = sessions.length;
        const totalWordsRead = sessions.reduce((sum, s) => sum + (parseInt(s.wordsRead) || 0), 0);
        const totalReadingTime = sessions.reduce((sum, s) => sum + (parseInt(s.duration) || 0), 0);
        let totalSpeed = sessions.reduce((sum, s) => sum + (parseInt(s.speed) || 0), 0);
        const avgSpeedCalc = totalSessions > 0 ? Math.round(totalSpeed / totalSessions) : 0;
        let avgScoreCalc = 0;
        if (quizzes.length > 0) {
            const totalScore = quizzes.reduce((sum, q) => sum + (parseInt(q.score) || 0), 0);
            avgScoreCalc = Math.round(totalScore / quizzes.length);
        }

        totalLessonsEl.textContent = toIndianNumbers(totalSessions);
        avgSpeedEl.textContent = toIndianNumbers(avgSpeedCalc);
        avgScoreEl.textContent = toIndianNumbers(avgScoreCalc) + '%';
        totalTimeEl.textContent = toIndianNumbers(Math.round(totalReadingTime / 60));

        // رسم بياني للسرعة
        const sortedSessions = [...sessions].sort((a,b) => new Date(a.date) - new Date(b.date)).slice(-10);
        const speedData = sortedSessions.map(s => parseInt(s.speed) || 0);
        const sessionLabels = sortedSessions.map((s,i) => `جلسة ${i+1}`);
        if (speedData.length > 0) {
            const ctxSpeed = document.getElementById('speedChart').getContext('2d');
            new Chart(ctxSpeed, {
                type: 'line',
                data: { labels: sessionLabels, datasets: [{ label: 'السرعة (كلمة/دقيقة)', data: speedData, borderColor: '#4361ee', backgroundColor: 'rgba(67, 97, 238, 0.1)', tension: 0.3, fill: true }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        } else {
            document.getElementById('speedChart').parentNode.innerHTML = '<p class="no-data">لا توجد بيانات كافية للرسم البياني</p>';
        }

        // رسم بياني دائري للدرجات
        let excellent=0, good=0, acceptable=0, poor=0;
        quizzes.forEach(q => {
            const score = parseInt(q.score) || 0;
            if (score >= 85) excellent++;
            else if (score >= 70) good++;
            else if (score >= 50) acceptable++;
            else poor++;
        });
        if (quizzes.length > 0) {
            const ctxPie = document.getElementById('scorePieChart').getContext('2d');
            new Chart(ctxPie, {
                type: 'pie',
                data: { labels: ['ممتاز (85+)', 'جيد (70-84)', 'مقبول (50-69)', 'ضعيف (<50)'], datasets: [{ data: [excellent, good, acceptable, poor], backgroundColor: ['#10b981','#4361ee','#f59e0b','#ef4444'], borderWidth: 0 }] },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        } else {
            document.getElementById('scorePieChart').parentNode.innerHTML = '<p class="no-data">لا توجد نتائج اختبارات بعد</p>';
        }

        // عرض آخر 10 جلسات
        const recentSessions = [...sessions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,10);
        if (recentSessions.length > 0) {
            sessionsBody.innerHTML = recentSessions.map(s => {
                const date = s.date ? new Date(s.date).toLocaleDateString('ar-EG') : 'غير معروف';
                const quiz = quizzes.find(q => q.lessonId === s.lessonId && new Date(q.date) > new Date(s.date));
                const score = quiz ? quiz.score : '—';
                const errors = parseInt(s.errors) || 0;
                const completed = s.completed === 'TRUE' ? 'نعم' : 'لا';
                const errorWords = s.errorWordsJson ? JSON.parse(s.errorWordsJson) : []; // مصفوفة كلمات
                return `
                <tr>
                    <td>${date}</td>
                    <td>${escapeHtml(s.lessonTitle || '—')}</td>
                    <td>${toIndianNumbers(s.speed || 0)}</td>
                    <td>${toIndianNumbers(errors)}</td>
                    <td>${score !== '—' ? toIndianNumbers(score) + '%' : '—'}</td>
                    <td>${toIndianNumbers(s.duration || 0)}</td>
                    <td><span class="badge ${completed === 'نعم' ? 'badge-success' : 'badge-warning'}">${completed}</span></td>
                    <td>
                        ${errorWords.length > 0 ? 
                            `<button class="details-btn" onclick='showErrorWords(${JSON.stringify(errorWords)})'><i class="fas fa-eye"></i> عرض</button>` : 
                            '<span class="badge badge-info">لا توجد</span>'}
                    </td>
                </tr>
            `}).join('');
        } else {
            sessionsBody.innerHTML = `<tr><td colspan="8" class="no-data">لا توجد جلسات بعد</td></tr>`;
        }
    })();

    // دالة عرض تفاصيل الأخطاء (تستقبل مصفوفة من الكلمات)
    window.showErrorWords = function(errorWords) {
        const modal = document.getElementById('errorDetailsModal');
        const modalErrorWords = document.getElementById('modalErrorWords');
        if (Array.isArray(errorWords) && errorWords.length > 0) {
            modalErrorWords.innerHTML = errorWords.map(word => `<span class="error-word-item">${escapeHtml(word)}</span>`).join('');
        } else {
            modalErrorWords.innerHTML = '<p>لا توجد كلمات خاطئة مسجلة.</p>';
        }
        modal.classList.add('show');
    };
</script>
</body>
</html>
