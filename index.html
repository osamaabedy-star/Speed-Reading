<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة القراءة السريعة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* نفس الأنماط السابقة - احتفظ بها كاملة من ملفك القديم */
        :root { --primary: #4361ee; --primary-light: #4895ef; --primary-dark: #3f37c9; --accent: #f72585; --bg: #f8fafc; --card-bg: #ffffff; --text: #0f172a; --text-light: #475569; --border: #e2e8f0; --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); --radius-lg: 32px; --radius-md: 24px; --radius-sm: 16px; --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        [data-theme="dark"] { --bg: #0b1120; --card-bg: #1e293b; --text: #f1f5f9; --text-light: #94a3b8; --border: #334155; }
        [data-theme="comfort"] { --bg: #e6d5b8; --card-bg: #fff7ed; --text: #5e4b3c; --text-light: #8b7a6b; --border: #d4b89c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; transition: var(--transition); }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); flex-wrap: wrap; gap: 15px; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo i { font-size: 2rem; color: var(--primary); }
        .logo h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .user-info { display: flex; align-items: center; gap: 15px; background: var(--bg); padding: 5px 15px; border-radius: 40px; border: 1px solid var(--border); }
        .user-info span { font-weight: 600; color: var(--primary); }
        .user-info button { background: transparent; border: none; color: var(--accent); cursor: pointer; font-size: 0.9rem; font-weight: 600; }
        .theme-buttons { display: flex; gap: 6px; }
        .theme-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .theme-btn:hover { background: var(--primary); color: white; }
        .main-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        @media (max-width:700px) { .main-grid { grid-template-columns:1fr; } }
        .settings-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 18px; border: 1px solid var(--border); position: sticky; top: 20px; }
        .section-title { font-size:1rem; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; color:var(--primary); border-bottom:2px solid var(--border); padding-bottom:8px; }
        .font-scroll-bar { display:flex; gap:6px; overflow-x:auto; padding:2px 0 10px; margin-bottom:12px; }
        .font-mini-btn { white-space:nowrap; padding:6px 12px; border-radius:30px; border:1px solid var(--border); background:var(--card-bg); color:var(--text); font-size:0.75rem; cursor:pointer; }
        .font-mini-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
        .size-controls { display:flex; align-items:center; gap:6px; background:var(--bg); padding:4px 8px; border-radius:30px; border:1px solid var(--border); margin-bottom:14px; width:fit-content; }
        .size-btn { width:28px; height:28px; border-radius:50%; border:none; background:var(--card-bg); color:var(--text); cursor:pointer; }
        #fontSizeValue { min-width:32px; text-align:center; font-weight:600; font-size:0.85rem; }
        .preview-box { background:var(--bg); border-radius:var(--radius-md); padding:12px; border:1px solid var(--border); text-align:center; margin:16px0; }
        .preview-text { font-size:22px; line-height:1.5; color:var(--primary); font-weight:600; transition:font-family0.2s; }
        .mode-cards { display:flex; gap:8px; margin-bottom:18px; }
        .mode-card { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px4px; text-align:center; cursor:pointer; }
        .mode-card i { font-size:1.5rem; color:var(--primary); margin-bottom:4px; }
        .mode-card span { display:block; font-weight:600; font-size:0.7rem; }
        .mode-card.active { border:2px solid var(--primary); background:color-mix(in srgb, var(--primary)8%, var(--bg)); }
        .speed-section { margin-bottom:18px; }
        .speed-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .speed-value { font-size:1.6rem; font-weight:700; color:var(--primary); }
        input[type=range] { width:100%; height:5px; background:var(--border); border-radius:10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--primary); cursor:pointer; }
        .filter-section { margin-bottom:18px; }
        .semester-buttons { display:flex; gap:12px; }
        .semester-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:8px10px; border-radius:50px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:0.8rem; font-weight:600; cursor:pointer; }
        .semester-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
        .grade-section { display:none; }
        .grade-section.show { display:block; }
        .grade-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
        .grade-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:6px2px; border-radius:16px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:0.65rem; font-weight:600; cursor:pointer; }
        .grade-btn .grade-number { font-size:1.2rem; font-weight:700; color:var(--primary); line-height:1; }
        .grade-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
        .lessons-column { background:var(--card-bg); border-radius:var(--radius-lg); padding:18px; border:1px solid var(--border); }
        .lessons-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .search-box { display:flex; align-items:center; gap:6px; background:var(--bg); padding:6px12px; border-radius:40px; border:1px solid var(--border); }
        .search-box input { border:none; background:transparent; color:var(--text); outline:none; width:200px; font-size:0.85rem; }
        .lessons-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; max-height:400px; overflow-y:auto; padding:4px; }
        .lesson-item { background:var(--bg); padding:10px4px; border-radius:var(--radius-sm); border:1px solid var(--border); cursor:pointer; text-align:center; position:relative; }
        .lesson-item:hover { transform:translateY(-3px); border-color:var(--primary); }
        .lesson-item.selected { border:2px solid var(--primary); background:color-mix(in srgb, var(--primary)10%, var(--bg)); }
        .lesson-item i { font-size:1.5rem; color:var(--primary); margin-bottom:4px; }
        .word-count-badge { position:absolute; top:3px; left:3px; background:var(--primary); color:white; padding:2px5px; border-radius:40px; font-size:0.55rem; }
        .lesson-title { font-weight:700; font-size:0.7rem; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .btn-launch { width:100%; padding:14px; background:linear-gradient(135deg, var(--primary), var(--primary-dark)); color:white; border:none; border-radius:60px; font-size:1.1rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-launch:disabled { background:var(--border); color:var(--text-light); cursor:not-allowed; }
        .admin-link { text-align:center; margin-top:16px; font-size:0.7rem; }
        .admin-link a { color:var(--text-light); text-decoration:none; }
        .admin-link a:hover { color:var(--primary); }
    </style>
</head>
<body data-theme="light">
<div class="container">
    <div class="header">
        <div class="logo">
            <i class="fas fa-book-open"></i>
            <h1>منصة القراءة السريعة</h1>
        </div>
        <div class="user-info">
            <span id="usernameDisplay"></span>
            <button onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
        <div class="theme-buttons">
            <div class="theme-btn light" onclick="setTheme('light')"><i class="fas fa-sun"></i></div>
            <div class="theme-btn dark" onclick="setTheme('dark')"><i class="fas fa-moon"></i></div>
            <div class="theme-btn comfort" onclick="setTheme('comfort')"><i class="fas fa-leaf"></i></div>
        </div>
    </div>

    <div class="main-grid">
        <!-- العمود الأيمن: الإعدادات -->
        <div class="settings-card">
            <h3 class="section-title"><i class="fas fa-sliders-h"></i> الإعدادات</h3>
            <div class="font-scroll-bar" id="miniFontSelector">
                <span class="font-mini-btn" data-font="'Amiri', serif" style="font-family: 'Amiri';">أميري</span>
                <span class="font-mini-btn" data-font="'Cairo', sans-serif" style="font-family: 'Cairo';">كايرو</span>
                <span class="font-mini-btn" data-font="'Almarai', sans-serif" style="font-family: 'Almarai';">المرائي</span>
                <span class="font-mini-btn" data-font="'Readex Pro', sans-serif" style="font-family: 'Readex Pro';">ريدكس</span>
            </div>
            <div class="size-controls">
                <button class="size-btn" id="decreaseFontSize"><i class="fas fa-minus"></i></button>
                <span id="fontSizeValue">٢٨</span>
                <button class="size-btn" id="increaseFontSize"><i class="fas fa-plus"></i></button>
            </div>
            <div class="preview-box">
                <p>معاينة الخط</p>
                <div class="preview-text" id="fontPreview">أسامة إبراهيم محمدي</div>
            </div>
            <div class="mode-cards" id="modeSelector">
                <div class="mode-card" data-mode="rsvp"><i class="fas fa-bolt"></i><span>كلمة بكلمة</span></div>
                <div class="mode-card" data-mode="scroll"><i class="fas fa-scroll"></i><span>تمرير انسيابي</span></div>
                <div class="mode-card" data-mode="static"><i class="fas fa-book-open"></i><span>نص ثابت</span></div>
            </div>
            <div class="speed-section">
                <div class="speed-label"><span><i class="fas fa-tachometer-alt"></i> السرعة</span><span class="speed-value" id="speedVal">١٥٠</span></div>
                <input type="range" id="speedSlider" min="10" max="400" step="10" value="150">
            </div>
            <div class="filter-section">
                <div class="semester-buttons" id="semesterSelector">
                    <div class="semester-btn" data-semester="1"><i class="fas fa-calendar"></i>الأول</div>
                    <div class="semester-btn" data-semester="2"><i class="fas fa-calendar-check"></i>الثاني</div>
                </div>
            </div>
            <div class="filter-section grade-section" id="gradeSection">
                <div class="grade-grid" id="gradeSelector">
                    <div class="grade-btn" data-grade="1"><span class="grade-number">١</span><span>الأول</span></div>
                    <div class="grade-btn" data-grade="2"><span class="grade-number">٢</span><span>الثاني</span></div>
                    <div class="grade-btn" data-grade="3"><span class="grade-number">٣</span><span>الثالث</span></div>
                    <div class="grade-btn" data-grade="4"><span class="grade-number">٤</span><span>الرابع</span></div>
                    <div class="grade-btn" data-grade="5"><span class="grade-number">٥</span><span>الخامس</span></div>
                    <div class="grade-btn" data-grade="6"><span class="grade-number">٦</span><span>السادس</span></div>
                </div>
            </div>
        </div>

        <!-- العمود الأيسر: الدروس -->
        <div class="lessons-column">
            <div class="lessons-header">
                <h3><i class="fas fa-book"></i> النصوص المتاحة</h3>
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="بحث..."></div>
            </div>
            <div id="lessonsGrid" class="lessons-grid"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div></div>
            <button class="btn-launch" id="startBtn" onclick="launchReader()" disabled><i class="fas fa-play"></i> ابدأ القراءة</button>
            <div class="admin-link"><a href="admin.html"><i class="fas fa-lock"></i> لوحة الإدارة</a></div>
        </div>
    </div>
</div>

<script src="database.js"></script>
<script>
    (function() {
        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!currentUser) { window.location.href = 'login.html'; return; }
        document.getElementById('usernameDisplay').textContent = currentUser.username;
    })();

    window.setTheme = function(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    };
    (function() {
        const saved = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', saved);
    })();

    let lessonsData = [];
    let selectedLessonId = null;
    let currentFont = "'Amiri', serif";
    let currentMode = 'rsvp';
    let currentSpeed = 150;
    let currentSemester = null;
    let currentGrade = null;
    let currentFontSize = 28;
    let searchTerm = '';

    const lessonsGrid = document.getElementById('lessonsGrid');
    const startBtn = document.getElementById('startBtn');
    const fontPreview = document.getElementById('fontPreview');
    const searchInput = document.getElementById('searchInput');
    const speedVal = document.getElementById('speedVal');
    const fontSizeValue = document.getElementById('fontSizeValue');
    const gradeSection = document.getElementById('gradeSection');
    const speedSlider = document.getElementById('speedSlider');

    function toIndianNumbers(num) {
        const arabicNumbers = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
        return num.toString().replace(/\d/g, d => arabicNumbers[d]);
    }

    function updateFontPreview() {
        fontPreview.style.fontFamily = currentFont;
        fontPreview.style.fontSize = currentFontSize + 'px';
        fontSizeValue.textContent = toIndianNumbers(currentFontSize);
    }

    function updateSpeedDisplay() {
        speedVal.textContent = toIndianNumbers(currentSpeed);
    }

    function getGradeFullName(gradeNumber) {
        const grades = ['الأول الابتدائي','الثاني الابتدائي','الثالث الابتدائي','الرابع الابتدائي','الخامس الابتدائي','السادس الابتدائي'];
        return grades[parseInt(gradeNumber)-1] || '';
    }

    function getSemesterFullName(semesterNumber) {
        return semesterNumber === '1' ? 'الفصل الدراسي الأول' : 'الفصل الدراسي الثاني';
    }

    async function loadAllLessons() {
        const files = ['primary_first.json','primary_second.json','upper_first.json','upper_second.json'];
        try {
            const promises = files.map(file => fetch(file).then(res => {
                if (!res.ok) throw new Error(`فشل تحميل ${file}`);
                return res.json();
            }));
            const results = await Promise.allSettled(promises);
            lessonsData = [];
            results.forEach(result => {
                if (result.status === 'fulfilled') {
                    lessonsData.push(...result.value);
                }
            });
            localStorage.setItem('reading_app_lessons', JSON.stringify(lessonsData));
            renderLessons();
        } catch (error) {
            lessonsGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--danger);">فشل تحميل الدروس</div>';
        }
    }

    function renderLessons() {
        if (!currentSemester || !currentGrade) {
            lessonsGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:30px;">اختر الفصل والصف أولاً</div>';
            startBtn.disabled = true;
            return;
        }
        const targetGrade = getGradeFullName(currentGrade);
        const targetSemester = getSemesterFullName(currentSemester);
        let filtered = lessonsData.filter(l => l.grade === targetGrade && l.semester === targetSemester);
        if (searchTerm) {
            filtered = filtered.filter(l => l.title.includes(searchTerm));
        }
        if (filtered.length === 0) {
            lessonsGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:30px;">لا توجد نصوص</div>';
            startBtn.disabled = true;
            return;
        }
        lessonsGrid.innerHTML = '';
        filtered.forEach(l => {
            const wordCount = l.content.split(/\s+/).length;
            const div = document.createElement('div');
            div.className = `lesson-item ${selectedLessonId === l.id ? 'selected' : ''}`;
            div.dataset.id = l.id;
            div.innerHTML = `<span class="word-count-badge">${toIndianNumbers(wordCount)}</span><i class="fas fa-file-alt"></i><div class="lesson-title">${escapeHtml(l.title)}</div>`;
            div.addEventListener('click', () => selectLesson(l.id));
            lessonsGrid.appendChild(div);
        });
        startBtn.disabled = !selectedLessonId;
    }

    window.selectLesson = function(id) {
        selectedLessonId = id;
        renderLessons();
    };

    window.launchReader = function() {
        if (!selectedLessonId) return alert('اختر نصاً أولاً');
        const lesson = lessonsData.find(l => l.id === selectedLessonId);
        if (!lesson) return;
        const config = {
            lessonId: selectedLessonId,
            speed: currentSpeed,
            mode: currentMode,
            font: currentFont,
            theme: document.body.getAttribute('data-theme'),
            fontSize: currentFontSize
        };
        sessionStorage.setItem('reader_config', JSON.stringify(config));
        window.location.href = 'read.html';
    };

    function loadUserPrefs() {
        const prefs = JSON.parse(localStorage.getItem('USER_PREFS_KEY')) || {};
        if (prefs.font) {
            const btn = document.querySelector(`.font-mini-btn[data-font="${prefs.font}"]`);
            if (btn) {
                currentFont = prefs.font;
                btn.classList.add('active');
            } else {
                document.querySelector('.font-mini-btn[data-font="\'Amiri\', serif"]').classList.add('active');
            }
        } else {
            document.querySelector('.font-mini-btn[data-font="\'Amiri\', serif"]').classList.add('active');
        }
        if (prefs.mode) {
            const modeCard = document.querySelector(`.mode-card[data-mode="${prefs.mode}"]`);
            if (modeCard) {
                currentMode = prefs.mode;
                modeCard.classList.add('active');
            } else {
                document.querySelector('.mode-card[data-mode="rsvp"]').classList.add('active');
            }
        } else {
            document.querySelector('.mode-card[data-mode="rsvp"]').classList.add('active');
        }
        if (prefs.speed) {
            currentSpeed = prefs.speed;
            speedSlider.value = currentSpeed;
            updateSpeedDisplay();
        }
        if (prefs.fontSize) currentFontSize = prefs.fontSize;
        fontSizeValue.textContent = toIndianNumbers(currentFontSize);
        updateFontPreview();
    }

    function saveUserPrefs() {
        localStorage.setItem('USER_PREFS_KEY', JSON.stringify({
            font: currentFont,
            mode: currentMode,
            speed: currentSpeed,
            fontSize: currentFontSize
        }));
    }

    speedSlider.addEventListener('input', e => {
        currentSpeed = e.target.value;
        updateSpeedDisplay();
        saveUserPrefs();
    });

    document.querySelectorAll('.font-mini-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.font-mini-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFont = this.dataset.font;
            updateFontPreview();
            saveUserPrefs();
        });
    });

    document.getElementById('increaseFontSize').addEventListener('click', () => {
        if (currentFontSize < 96) { currentFontSize += 2; fontSizeValue.textContent = toIndianNumbers(currentFontSize); updateFontPreview(); saveUserPrefs(); }
    });
    document.getElementById('decreaseFontSize').addEventListener('click', () => {
        if (currentFontSize > 12) { currentFontSize -= 2; fontSizeValue.textContent = toIndianNumbers(currentFontSize); updateFontPreview(); saveUserPrefs(); }
    });

    document.querySelectorAll('.mode-card').forEach(card => {
        card.addEventListener('click', function() {
            document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            currentMode = this.dataset.mode;
            saveUserPrefs();
        });
    });

    document.querySelectorAll('.semester-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.semester-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentSemester = this.dataset.semester;
            gradeSection.classList.add('show');
            currentGrade = null;
            document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
            selectedLessonId = null;
            renderLessons();
            saveUserPrefs();
        });
    });

    document.querySelectorAll('.grade-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentGrade = this.dataset.grade;
            selectedLessonId = null;
            renderLessons();
            saveUserPrefs();
        });
    });

    searchInput.addEventListener('input', e => {
        searchTerm = e.target.value;
        renderLessons();
    });

    function escapeHtml(unsafe) {
        if (typeof unsafe !== 'string') return unsafe;
        return unsafe.replace(/[&<>"]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    window.onload = () => {
        loadUserPrefs();
        loadAllLessons();
        startBtn.disabled = true;
        updateSpeedDisplay();
        fontSizeValue.textContent = toIndianNumbers(currentFontSize);
        gradeSection.classList.remove('show');
    };
</script>
</body>
</html>
