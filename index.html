<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>منصة القراءة السريعة - مدارس رياض الإبداع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&family=Almarai:wght@400;700&family=Readex+Pro:wght@400;700&family=Katibeh&family=Lalezar&family=Markazi+Text:wght@400;700&family=Scheherazade+New:wght@400;700&family=Harmattan:wght@400;700&family=El+Messiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* نفس الأنماط السابقة - احتفظ بها كما هي (لن أكررها للاختصار) */
        /* يفضل نسخها من ملفك الأصلي */
        :root { --primary: #4361ee; --primary-light: #4895ef; --primary-dark: #3f37c9; --accent: #f72585; --bg: #f8fafc; --card-bg: #ffffff; --text: #0f172a; --text-light: #475569; --border: #e2e8f0; --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); --radius-lg: 32px; --radius-md: 24px; --radius-sm: 16px; --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        [data-theme="dark"] { --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --text-light: #94a3b8; --border: #334155; }
        [data-theme="comfort"] { --bg: #f5e9da; --card-bg: #fff7ed; --text: #5e4b3c; --text-light: #8b7a6b; --border: #d9c9b4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; transition: var(--transition); line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; }
        /* باقي الأنماط موجودة في ملفك الأصلي، احتفظ بها */
        /* سأضع هنا فقط التعديلات الضرورية */
    </style>
</head>
<body data-theme="light">
<div class="container">
    <!-- الهيدر (كما هو) -->
    <div class="header">
        <div class="logo-container">
            <img src="https://www.wzufa.com/wp-content/uploads/2022/07/Riyadh-Al-Ebdaa-Schools.png" alt="شعار مدارس الرياض الإبداع" class="school-logo">
            <div><h1>منصة القراءة السريعة</h1><p>مدارس رياض الإبداع الأهلية</p></div>
        </div>
        <div class="user-info" id="userInfo"><span id="usernameDisplay"></span><button id="logoutBtn" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> خروج</button></div>
        <div class="header-actions">
            <div class="theme-buttons">
                <div class="theme-btn light" onclick="setTheme('light')" title="الوضع النهاري"><i class="fas fa-sun"></i></div>
                <div class="theme-btn dark" onclick="setTheme('dark')" title="الوضع الليلي"><i class="fas fa-moon"></i></div>
                <div class="theme-btn comfort" onclick="setTheme('comfort')" title="الوضع المريح"><i class="fas fa-leaf"></i></div>
            </div>
            <button class="help-header-btn" id="helpBtn" title="طريقة الاستخدام"><i class="fas fa-question"></i></button>
        </div>
    </div>

    <!-- المحتوى الرئيسي (نفس الهيكل) -->
    <div class="main-grid">
        <!-- العمود الأيمن: الإعدادات (كما هو) -->
        <div class="settings-card"> ... </div>
        <!-- العمود الأيسر: الدروس -->
        <div class="lessons-column">
            <div class="lessons-header">
                <h3><i class="fas fa-book"></i> النصوص المتاحة</h3>
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="بحث..." autocomplete="off"></div>
            </div>
            <div id="lessonsGrid" class="lessons-grid"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري تحميل النصوص...</div></div>
            <div class="start-btn-container"><button class="btn-launch" id="startBtn" onclick="launchReader()" disabled><i class="fas fa-play"></i> ابدأ القراءة</button></div>
            <div class="admin-link"><a href="admin.html"><i class="fas fa-lock"></i> لوحة الإدارة</a></div>
        </div>
    </div>
</div>

<!-- مودال المساعدة (كما هو) -->
<div class="help-modal" id="helpModal">...</div>

<script src="database.js"></script>
<script>
    (function checkLogin() {
        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!currentUser) { window.location.href = 'login.html'; return; }
        document.getElementById('usernameDisplay').textContent = currentUser.username;
    })();

    // دوال مساعدة
    function setTheme(theme) { document.body.setAttribute('data-theme', theme); localStorage.setItem('theme', theme); }
    (function loadTheme() { const savedTheme = localStorage.getItem('theme') || 'light'; document.body.setAttribute('data-theme', savedTheme); })();

    let lessonsData = [];
    let selectedLessonId = null;
    let currentFont = "'Amiri', serif";
    let currentMode = 'rsvp';
    let currentSpeed = 150;
    let currentSemester = null;
    let currentGrade = null;
    let currentFontSize = 28;
    let searchTerm = '';

    // عناصر DOM
    const lessonsGrid = document.getElementById('lessonsGrid');
    const startBtn = document.getElementById('startBtn');
    const searchInput = document.getElementById('searchInput');
    const gradeSection = document.getElementById('gradeSection'); // تأكد من وجوده في HTML

    // تحميل الدروس من API
    async function loadAllLessons() {
        try {
            lessonsData = await getAllLessons();
            // تخزين في localStorage لاستخدام read.html
            localStorage.setItem('reading_app_lessons', JSON.stringify(lessonsData));
            renderLessons();
        } catch (error) {
            console.error('فشل تحميل الدروس:', error);
            lessonsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--danger);"><i class="fas fa-exclamation-triangle fa-3x"></i><p>فشل تحميل الدروس. تأكد من الاتصال بالإنترنت.</p></div>`;
        }
    }

    function getGradeFullName(gradeNumber) {
        const grades = ['الأول الابتدائي','الثاني الابتدائي','الثالث الابتدائي','الرابع الابتدائي','الخامس الابتدائي','السادس الابتدائي'];
        return grades[parseInt(gradeNumber)-1] || 'غير معروف';
    }
    function getSemesterFullName(semesterNumber) { return semesterNumber === '1' ? 'الفصل الدراسي الأول' : 'الفصل الدراسي الثاني'; }

    function renderLessons() {
        if (!currentSemester || !currentGrade) {
            lessonsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--text-light);"><i class="fas fa-hand-point-up fa-3x"></i><p>الرجاء اختيار الفصل والصف أولاً</p></div>`;
            startBtn.disabled = true;
            return;
        }
        const targetGradeName = getGradeFullName(currentGrade);
        const targetSemesterName = getSemesterFullName(currentSemester);
        let filtered = lessonsData.filter(l => l.grade === targetGradeName && l.semester === targetSemesterName);
        if (searchTerm.trim()) {
            const term = searchTerm.trim().toLowerCase();
            filtered = filtered.filter(l => l.title.toLowerCase().includes(term));
        }
        if (filtered.length === 0) {
            lessonsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--text-light);"><i class="fas fa-folder-open fa-3x"></i><p>لا توجد نصوص</p></div>`;
            startBtn.disabled = true;
            return;
        }
        lessonsGrid.innerHTML = '';
        filtered.forEach(l => {
            const wordCount = l.content.split(/\s+/).length;
            const div = document.createElement('div');
            div.className = `lesson-item ${selectedLessonId === l.id ? 'selected' : ''}`;
            div.dataset.id = l.id;
            div.innerHTML = `<span class="word-count-badge">${toIndianNumbers(wordCount)}</span><i class="fas fa-file-alt"></i><div class="lesson-title">${escapeHtml(l.title)}</div>`;
            div.addEventListener('click', () => selectLesson(l.id));
            lessonsGrid.appendChild(div);
        });
        startBtn.disabled = !selectedLessonId;
    }

    window.selectLesson = function(id) { selectedLessonId = id; renderLessons(); };

    function launchReader() {
        if (!selectedLessonId) { alert('يرجى اختيار نص أولاً'); return; }
        const lesson = lessonsData.find(l => l.id === selectedLessonId);
        if (!lesson) return;
        const config = {
            lessonId: selectedLessonId,
            speed: currentSpeed,
            mode: currentMode,
            font: currentFont,
            theme: document.body.getAttribute('data-theme'),
            fontSize: currentFontSize
        };
        sessionStorage.setItem('reader_config', JSON.stringify(config));
        window.location.href = 'read.html';
    }

    // تحميل التفضيلات المحفوظة
    function loadUserPrefs() {
        const prefs = JSON.parse(localStorage.getItem('USER_PREFS_KEY')) || {};
        if (prefs.font) currentFont = prefs.font; else currentFont = "'Amiri', serif";
        if (prefs.mode) currentMode = prefs.mode;
        if (prefs.speed) currentSpeed = prefs.speed;
        if (prefs.fontSize) currentFontSize = prefs.fontSize;
        // تحديث واجهة الإعدادات حسب الحاجة
    }
    function saveUserPrefs() {
        localStorage.setItem('USER_PREFS_KEY', JSON.stringify({ font: currentFont, mode: currentMode, speed: currentSpeed, fontSize: currentFontSize }));
    }

    // أحداث (كما هي)
    document.getElementById('speedSlider').addEventListener('input', e => { currentSpeed = e.target.value; updateSpeedDisplay(); saveUserPrefs(); });
    // ... باقي الأحداث (اختيار الخط، حجم الخط، إلخ) موجودة في ملفك الأصلي، احتفظ بها.

    // أحداث الفصل والصف
    document.querySelectorAll('.semester-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.semester-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentSemester = this.dataset.semester;
            gradeSection.classList.add('show');
            currentGrade = null;
            document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
            selectedLessonId = null;
            renderLessons();
            saveUserPrefs();
        });
    });
    document.querySelectorAll('.grade-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentGrade = this.dataset.grade;
            selectedLessonId = null;
            renderLessons();
            saveUserPrefs();
        });
    });
    searchInput.addEventListener('input', e => { searchTerm = e.target.value; renderLessons(); });

    // التهيئة
    window.onload = () => {
        loadUserPrefs();
        loadAllLessons();
        startBtn.disabled = true;
        // تحديث معاينة الخط إلخ...
    };
</script>
</body>
</html>
