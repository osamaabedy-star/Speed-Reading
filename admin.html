<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المستخدمين - القراءة السريعة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* أنماط مشابهة لصفحة admin السابقة مع بعض التعديلات */
        :root { --primary: #4361ee; --primary-light: #4895ef; --primary-dark: #3f37c9; --accent: #f72585; --bg: #f8fafc; --card-bg: #ffffff; --text: #0f172a; --text-light: #475569; --border: #e2e8f0; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); --radius-lg: 32px; --radius-md: 24px; --radius-sm: 16px; --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        [data-theme="dark"] { --bg: #0b1120; --card-bg: #1e293b; --text: #f1f5f9; --text-light: #94a3b8; --border: #334155; --primary: #667eea; --accent: #f472b6; }
        [data-theme="comfort"] { --bg: #e6d5b8; --card-bg: #fff7ed; --text: #5e4b3c; --text-light: #8b7a6b; --border: #d4b89c; --primary: #b38b5d; --accent: #c44536; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
        body { background:var(--bg); color:var(--text); min-height:100vh; padding:20px; transition:var(--transition); line-height:1.6; }
        .container { max-width:1200px; margin:0 auto; }
        .header { display:flex; justify-content:space-between; align-items:center; background:var(--card-bg); padding:20px30px; border-radius:var(--radius-lg); margin-bottom:30px; box-shadow:var(--shadow-md); border:1px solid var(--border); flex-wrap:wrap; gap:15px; }
        .logo { display:flex; align-items:center; gap:15px; color:var(--primary); }
        .stats-bar { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:var(--card-bg); padding:20px; border-radius:var(--radius-md); display:flex; align-items:center; gap:15px; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
        .card { background:var(--card-bg); padding:25px; border-radius:var(--radius-md); box-shadow:var(--shadow-md); border:1px solid var(--border); }
        .card-title { font-size:1.3rem; margin-bottom:20px; color:var(--primary-dark); border-bottom:2px solid var(--bg); padding-bottom:10px; display:flex; align-items:center; gap:10px; }
        .users-table { width:100%; border-collapse:collapse; background:var(--bg); border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
        .users-table th { background:var(--primary); color:white; padding:12px8px; font-size:0.9rem; }
        .users-table td { padding:10px8px; border-bottom:1px solid var(--border); text-align:center; font-size:0.85rem; }
        .badge { padding:4px10px; border-radius:40px; font-size:0.75rem; font-weight:600; display:inline-block; }
        .badge-success { background:var(--success); color:white; }
        .badge-warning { background:var(--warning); color:white; }
        .action-btn { background:transparent; border:none; font-size:1.1rem; cursor:pointer; margin:0 3px; transition:0.2s; }
        .action-btn.approve { color:var(--success); }
        .action-btn.delete { color:var(--danger); }
        .action-btn:hover { transform:scale(1.1); }
        .refresh-btn { background:var(--bg); border:1px solid var(--border); border-radius:40px; padding:8px16px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; margin-bottom:15px; }
    </style>
</head>
<body data-theme="light">
<div class="container">
    <div class="header">
        <div class="logo"><i class="fas fa-user-shield fa-2x"></i><div><h1>لوحة التحكم</h1><p style="font-size:0.8rem; color:var(--text-light);">إدارة المستخدمين</p></div></div>
        <div class="actions"><button class="btn btn-primary" onclick="location.href='index.html'"><i class="fas fa-home"></i> الرئيسية</button></div>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><i class="fas fa-users" style="color:var(--primary)"></i><div><h4 id="count-users">0</h4><p>مستخدمين</p></div></div>
        <div class="stat-card"><i class="fas fa-user-check" style="color:var(--success)"></i><div><h4 id="count-approved">0</h4><p>مفعل</p></div></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 class="card-title" style="margin-bottom:0;"><i class="fas fa-users"></i> قائمة المستخدمين</h3>
            <button class="refresh-btn" id="refreshUsersBtn"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
        <div style="overflow-x:auto;">
            <table class="users-table" id="usersTable">
                <thead><tr><th>اسم المستخدم</th><th>الاسم الكامل</th><th>رقم الجوال</th><th>رقم الحساب</th><th>الصف</th><th>الفصل</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
                <tbody id="usersTableBody"><tr><td colspan="8" style="text-align:center;">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script src="database.js"></script>
<script>
    (async function() {
        // التحقق من أن المستخدم الحالي هو مسؤول (يمكنك تخصيص ذلك)
        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'admin') {
            alert('غير مصرح لك بالدخول');
            window.location.href = 'index.html';
            return;
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);

        async function renderUsers() {
            try {
                const users = await getAllUsers();
                const tbody = document.getElementById('usersTableBody');
                document.getElementById('count-users').innerText = users.length;
                document.getElementById('count-approved').innerText = users.filter(u => u.approved).length;

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا يوجد مستخدمين</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(u => {
                    const approved = u.approved === true;
                    return `
                    <tr>
                        <td>${escapeHtml(u.username)}</td>
                        <td>${escapeHtml(u.full_name || '-')}</td>
                        <td>${escapeHtml(u.phone || '-')}</td>
                        <td>${escapeHtml(u.account_number || '-')}</td>
                        <td>${escapeHtml(u.grade || '-')}</td>
                        <td>${u.semester === '1' ? 'الأول' : 'الثاني'}</td>
                        <td><span class="badge ${approved ? 'badge-success' : 'badge-warning'}">${approved ? 'مفعل' : 'غير مفعل'}</span></td>
                        <td>
                            <button class="action-btn approve" title="${approved ? 'تعطيل' : 'تفعيل'}" onclick="toggleApprove('${u.username}', ${!approved})">
                                <i class="fas ${approved ? 'fa-toggle-on' : 'fa-toggle-off'}"></i>
                            </button>
                            <button class="action-btn delete" title="حذف" onclick="deleteUserHandler('${u.username}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `}).join('');
            } catch (error) {
                document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="8" style="color:var(--danger);">خطأ في تحميل المستخدمين</td></tr>';
            }
        }

        window.toggleApprove = async function(username, newStatus) {
            if (!confirm(`هل أنت متأكد من ${newStatus ? 'تفعيل' : 'تعطيل'} هذا المستخدم؟`)) return;
            try {
                await updateUserApproval(username, newStatus);
                await renderUsers();
                alert('تم تحديث حالة المستخدم');
            } catch (error) {
                alert('فشل التحديث: ' + error.message);
            }
        };

        window.deleteUserHandler = async function(username) {
            if (!confirm('هل أنت متأكد من حذف هذا المستخدم نهائياً؟')) return;
            try {
                await deleteUser(username);
                await renderUsers();
                alert('تم حذف المستخدم');
            } catch (error) {
                alert('فشل الحذف: ' + error.message);
            }
        };

        document.getElementById('refreshUsersBtn').addEventListener('click', renderUsers);

        await renderUsers();
    })();

    function escapeHtml(unsafe) {
        if (typeof unsafe !== 'string') return unsafe;
        return unsafe.replace(/[&<>"]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }
</script>
</body>
</html>
